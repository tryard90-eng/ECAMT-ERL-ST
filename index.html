<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECAM Tier List | SMP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #161b22; border-bottom: 2px solid #58a6ff; }
        .tier-card { background: #161b22; border-radius: 15px; padding: 25px; border: 1px solid #30363d; margin-top: 20px; }
        .search-box { background: #0d1117; border: 1px solid #58a6ff; color: white; border-radius: 10px; padding: 12px; width: 100%; margin-bottom: 20px; }
        .kit-btn { margin: 5px; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .player-row { background: #21262d; margin-bottom: 10px; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; border-left: 5px solid transparent; }
        .sword-tier { border-left-color: #ff4444; }
        .axe-tier { border-left-color: #ffbb33; }
        .smp-tier { border-left-color: #00C851; }
        .rank-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; background: #30363d; color: #58a6ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-link { cursor: pointer; font-weight: bold; }
        .kit-icon { margin-right: 10px; color: #58a6ff; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#" onclick="showTab('home')">PLAY.ECAM.CLUB</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link px-3" onclick="showTab('home')">HOME</a>
            <a class="nav-link px-3" onclick="showTab('tiers')">TIERS</a>
            <a class="nav-link px-3 text-info" href="https://discord.gg/Jxuh6eYZ" target="_blank"><i class="fab fa-discord"></i> DISCORD</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div id="home" class="tab-content active text-center">
        <h1 class="display-4 fw-bold">ECAM TIER LIST</h1>
        <p class="text-muted">Sword, Axe ve SMP Dünyasının En İyileri</p>
        <div class="mt-4">
            <button class="btn btn-outline-primary btn-lg m-2" onclick="showTab('tiers')">Sıralamayı Gör</button>
            <a href="https://discord.gg/Jxuh6eYZ" target="_blank" class="btn btn-primary btn-lg m-2">Discord'a Katıl</a>
        </div>
    </div>

    <div id="tiers" class="tab-content">
        <div class="tier-card shadow-lg">
            <input type="text" id="playerSearch" class="search-box" placeholder="Oyuncu ara..." onkeyup="filterPlayers()">
            
            <div class="d-flex justify-content-center mb-4">
                <button class="btn btn-danger kit-btn" onclick="filterKit('Sword')"><i class="fas fa-fencing"></i> SWORD</button>
                <button class="btn btn-warning kit-btn" onclick="filterKit('Axe')"><i class="fas fa-axe"></i> AXE</button>
                <button class="btn btn-success kit-btn" onclick="filterKit('SMP')"><i class="fas fa-shield-heart"></i> SMP</button>
                <button class="btn btn-secondary kit-btn" onclick="filterKit('All')">HEPSİ</button>
            </div>

            <div id="playerList">
                <div class="player-row sword-tier" data-kit="Sword">
                    <div>
                        <i class="fas fa-fencing kit-icon"></i>
                        <span class="fw-bold">LuisBack</span>
                    </div>
                    <span class="rank-badge">Discord: Sunucu Kurucusu</span>
                </div>

                <div class="player-row axe-tier" data-kit="Axe">
                    <div>
                        <i class="fas fa-axe kit-icon"></i>
                        <span class="fw-bold">Janekv</span>
                    </div>
                    <span class="rank-badge">Discord: Moderator</span>
                </div>

                <div class="player-row smp-tier" data-kit="SMP">
                    <div>
                        <i class="fas fa-shield-heart kit-icon"></i>
                        <span class="fw-bold">EcamPro</span>
                    </div>
                    <span class="rank-badge">Discord: Elite Member</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    }

    function filterKit(kit) {
        let rows = document.querySelectorAll('.player-row');
        rows.forEach(row => {
            if (kit === 'All' || row.getAttribute('data-kit') === kit) {
                row.style.display = 'flex';
            } else {
                row.style.display = 'none';
            }
        });
    }

    function filterPlayers() {
        let input = document.getElementById('playerSearch').value.toLowerCase();
        let rows = document.querySelectorAll('.player-row');
        rows.forEach(row => {
            let name = row.innerText.toLowerCase();
            row.style.display = name.includes(input) ? 'flex' : 'none';
        });
    }
</script>

</body>
</html>

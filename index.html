<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECAM Tier List | Rankings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0d1117;
            --navbar-bg: #161b22;
            --card-bg: #0d1117;
            --row-bg: #12151a;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --gold: #ffb100;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* NAVBAR - Kapsül Tasarım */
        .header-wrapper {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            background-color: var(--navbar-bg);
            padding: 12px 30px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
        }
        .navbar-brand {
            color: #ff4444;
            font-weight: 900;
            font-size: 1.8rem;
            text-decoration: none;
            margin-right: 50px;
            font-style: italic;
            letter-spacing: -1px;
        }
        .navbar-brand span { color: #fff; }

        .nav-links { display: flex; gap: 20px; flex-grow: 1; }
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 12px;
            transition: 0.3s;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link:hover, .nav-link.active {
            color: #fff;
            background-color: #21262d;
        }

        .search-box {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 15px;
            color: #fff;
            width: 220px;
            outline: none;
        }

        /* MAIN CONTAINER */
        .container { 
            max-width: 1150px; 
            margin: 0 auto; 
            background-color: rgba(22, 27, 34, 0.5); 
            border-radius: 20px; 
            padding: 40px; 
            border: 1px solid var(--border-color); 
        }
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* KİT FİLTRELERİ */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 50px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .filter-btn {
            background-color: #161b22;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            cursor: pointer;
            padding: 12px;
            border-radius: 14px;
            width: 85px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .filter-btn img { width: 34px; height: 34px; image-rendering: pixelated; }
        .filter-btn:hover { transform: translateY(-4px); border-color: var(--gold); }
        .filter-btn.active {
            background-color: #21262d;
            border-color: #fff;
            color: #fff;
            border-bottom: 4px solid var(--gold);
        }

        /* OYUNCU SATIRI */
        .player-row {
            background-color: var(--row-bg);
            border-radius: 18px;
            display: flex;
            align-items: center;
            padding: 20px 30px;
            margin-bottom: 18px;
            border: 1px solid var(--border-color);
            transition: 0.2s;
        }
        .player-row:hover { border-color: #58a6ff; background-color: #1c2128; }
        
        .rank-num { font-size: 2.2rem; font-weight: 900; font-style: italic; color: #fff; width: 70px; opacity: 0.9; }
        
        .player-img-box { margin-right: 25px; }
        .player-head { width: 65px; height: 65px; border-radius: 8px; border: 2px solid #30363d; }
        
        .player-details { flex-grow: 1; }
        .player-name { font-size: 1.4rem; font-weight: bold; margin-bottom: 6px; }
        .player-stats { color: var(--text-muted); font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .kit-icon-small { width: 20px; height: 20px; image-rendering: pixelated; }

        .region-tag {
            background-color: rgba(35, 134, 54, 0.2);
            color: #4dfa92;
            padding: 6px 15px;
            border-radius: 8px;
            font-weight: 800;
            margin: 0 40px;
            border: 1px solid rgba(77, 250, 146, 0.3);
        }

        .tiers-list { display: flex; gap: 12px; }
        .tier-badge-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tier-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #21262d;
            border: 2px solid var(--border-color);
        }
        .tier-circle img { width: 24px; height: 24px; image-rendering: pixelated; }
        .tier-label { font-size: 0.75rem; font-weight: 900; color: var(--gold); }
    </style>
</head>
<body>

<div class="header-wrapper">
    <a href="#" class="navbar-brand">TR<span>TIERS</span></a>
    <div class="nav-links">
        <a class="nav-link" id="nav-home" onclick="changePage('home')"><i class="fas fa-home"></i> Home</a>
        <a class="nav-link active" id="nav-rankings" onclick="changePage('rankings')"><i class="fas fa-trophy"></i> Rankings</a>
        <a class="nav-link" href="https://discord.gg/Jxuh6eYZ" target="_blank"><i class="fab fa-discord"></i> Discords</a>
    </div>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="Search player..." onkeyup="searchPlayer()">
    </div>
</div>

<div class="container">
    <div id="home" class="page-content" style="text-align: center; padding: 80px 0;">
        <h1>ECAM TIER LIST</h1>
        <p>En güncel PvP sıralamaları burada kanka.</p>
    </div>

    <div id="rankings" class="page-content active">
        <!-- KİT FİLTRELERİ (Görsel Linkleri Güncellendi) -->
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterByKit('all', this)"><i class="fas fa-trophy" style="font-size: 1.8rem; color: var(--gold);"></i><span>All</span></button>
            <button class="filter-btn" onclick="filterByKit('vanilla', this)"><img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/end_crystal.png"><span>Vanilla</span></button>
            <button class="filter-btn" onclick="filterByKit('uhc', this)"><img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/golden_apple.png"><span>UHC</span></button>
            <button class="filter-btn" onclick="filterByKit('pot', this)"><img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/potion_bottle_splash_healing.png"><span>Pot</span></button>
            <button class="filter-btn" onclick="filterByKit('nethop', this)"><img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/netherite_helmet.png"><span>NethOP</span></button>
            <button class="filter-btn" onclick="filterByKit('smp', this)"><img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/shield.png"><span>SMP</span></button>
            <button class="filter-btn" onclick="filterByKit('sword', this)"><img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/netherite_sword.png"><span>Sword</span></button>
            <button class="filter-btn" onclick="filterByKit('axe', this)"><img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/netherite_axe.png"><span>Axe</span></button>
            <button class="filter-btn" onclick="filterByKit('mace', this)"><img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/mace.png"><span>Mace</span></button>
        </div>

        <div id="playerList">
            <!-- 1. LuisBack -->
            <div class="player-row" data-kits="all vanilla sword">
                <div class="rank-num">1.</div>
                <div class="player-img-box">
                    <img src="https://minotar.net/avatar/LuisBack/65" class="player-head">
                </div>
                <div class="player-details">
                    <div class="player-name">LuisBack</div>
                    <div class="player-stats">
                        <img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/end_crystal.png" class="kit-icon-small">
                        Combat Specialist (75 points)
                    </div>
                </div>
                <div class="region-tag">TR</div>
                <div class="tiers-list">
                    <div class="tier-badge-container">
                        <div class="tier-circle" style="border-color: #b388ff;"><img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/netherite_helmet.png"></div>
                        <span class="tier-label">LT1</span>
                    </div>
                    <div class="tier-badge-container">
                        <div class="tier-circle" style="border-color: #ffb100;"><img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/potion_bottle_splash_healing.png"></div>
                        <span class="tier-label">HT2</span>
                    </div>
                </div>
            </div>

            <!-- 2. Dalft -->
            <div class="player-row" data-kits="all axe smp">
                <div class="rank-num">2.</div>
                <div class="player-img-box">
                    <img src="https://minotar.net/avatar/Dalft/65" class="player-head">
                </div>
                <div class="player-details">
                    <div class="player-name">Dalft</div>
                    <div class="player-stats">
                        <img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/netherite_axe.png" class="kit-icon-small">
                        Combat Cadet (44 points)
                    </div>
                </div>
                <div class="region-tag">TR</div>
                <div class="tiers-list">
                    <div class="tier-badge-container">
                        <div class="tier-circle" style="border-color: #ffb100;"><img src="https://raw.githubusercontent.com/super-mario-reborn/minecraft-assets/master/assets/minecraft/textures/item/netherite_axe.png"></div>
                        <span class="tier-label">HT3</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function changePage(pageId) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active');
    }

    function searchPlayer() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let players = document.querySelectorAll('.player-row');
        players.forEach(p => {
            let name = p.querySelector('.player-name').innerText.toLowerCase();
            p.style.display = name.includes(input) ? 'flex' : 'none';
        });
    }

    function filterByKit(kit, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        let players = document.querySelectorAll('.player-row');
        players.forEach(p => {
            let kits = p.getAttribute('data-kits');
            p.style.display = kits.includes(kit) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>

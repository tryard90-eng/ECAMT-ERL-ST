<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECAM Tier List | Rankings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0d1117;
            --navbar-bg: #161b22;
            --card-bg: #12151a;
            --row-bg: #161b22;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --accent-blue: #58a6ff;
            --gold: #ffb100;
            --green-box: #238636;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* NAVBAR (Resimdeki gibi üstte kapsül şeklinde) */
        .header-wrapper {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            background-color: var(--navbar-bg);
            padding: 10px 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            border: 1px solid #30363d;
        }
        .navbar-brand {
            color: #ff4444;
            font-weight: 900;
            font-size: 1.8rem;
            text-decoration: none;
            margin-right: 50px;
            font-style: italic;
        }
        .navbar-brand span { color: #fff; }

        .nav-links { display: flex; gap: 15px; flex-grow: 1; }
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 10px;
            transition: 0.3s;
            cursor: pointer;
            font-weight: 500;
        }
        .nav-link:hover, .nav-link.active {
            color: #fff;
            background-color: #21262d;
        }

        .search-container { position: relative; }
        .search-box {
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 8px 15px;
            color: #fff;
            width: 200px;
        }

        /* MAIN CONTAINER */
        .container { max-width: 1100px; margin: 0 auto; background-color: var(--card-bg); border-radius: 20px; padding: 30px; border: 1px solid #30363d; }
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* KİT FİLTRELERİ (Resimdeki gibi kare kutular) */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .filter-btn {
            background-color: #161b22;
            border: 1px solid #30363d;
            color: var(--text-muted);
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .filter-btn img { width: 32px; height: 32px; image-rendering: pixelated; }
        .filter-btn:hover { border-color: var(--gold); transform: translateY(-3px); }
        .filter-btn.active {
            background-color: #21262d;
            border-color: #fff;
            color: #fff;
            border-bottom: 3px solid #fff;
        }

        /* OYUNCU SATIRI (Resimdeki gibi yanlamasına) */
        .player-row {
            background-color: var(--row-bg);
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 15px 25px;
            margin-bottom: 15px;
            border: 1px solid #30363d;
            transition: 0.2s;
        }
        .player-row:hover { transform: scale(1.01); border-color: #58a6ff; }
        
        .rank-num { font-size: 2rem; font-weight: 900; font-style: italic; color: #fff; width: 60px; }
        
        .player-img-box { position: relative; margin-right: 20px; }
        .player-head { width: 60px; height: 60px; border-radius: 5px; background: #21262d; }
        
        .player-details { flex-grow: 1; }
        .player-name { font-size: 1.3rem; font-weight: bold; margin-bottom: 4px; }
        .player-stats { color: var(--text-muted); font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .crystal-icon { width: 16px; height: 16px; image-rendering: pixelated; }

        .region-tag {
            background-color: #1a4d32;
            color: #4dfa92;
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: bold;
            margin: 0 30px;
        }

        .tiers-list { display: flex; gap: 10px; }
        .tier-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #21262d;
            border: 2px solid #30363d;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .tier-circle.active { border-color: #ffb100; color: #ffb100; }
        .tier-circle.mace { border-color: #b388ff; color: #b388ff; }
    </style>
</head>
<body>

<div class="header-wrapper">
    <a href="#" class="navbar-brand">ECAM<span>TIERS</span></a>
    <div class="nav-links">
        <a class="nav-link" id="nav-home" onclick="changePage('home')"><i class="fas fa-home"></i> Home</a>
        <a class="nav-link active" id="nav-rankings" onclick="changePage('rankings')"><i class="fas fa-trophy"></i> Rankings</a>
        <a class="nav-link" href="https://discord.gg/Jxuh6eYZ" target="_blank"><i class="fab fa-discord"></i> Discords</a>
    </div>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="Search player..." onkeyup="searchPlayer()">
    </div>
</div>

<div class="container">
    <div id="home" class="page-content" style="text-align: center; padding: 100px 0;">
        <h1>WELCOME TO ECAM</h1>
        <p>En iyi PvP sıralaması için Rankings sekmesine bak kanka.</p>
    </div>

    <div id="rankings" class="page-content active">
        <!-- KİT FİLTRELERİ -->
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterByKit('all', this)"><i class="fas fa-trophy" style="font-size: 1.5rem; margin-bottom: 5px;"></i><span>All</span></button>
            <button class="filter-btn" onclick="filterByKit('vanilla', this)"><img src="https://minecraft.wiki/images/End_Crystal_JE2_BE2.png"><span>Vanilla</span></button>
            <button class="filter-btn" onclick="filterByKit('uhc', this)"><img src="https://minecraft.wiki/images/Invicon_Golden_Apple.png"><span>UHC</span></button>
            <button class="filter-btn" onclick="filterByKit('pot', this)"><img src="https://minecraft.wiki/images/Invicon_Splash_Potion_of_Healing.png"><span>Pot</span></button>
            <button class="filter-btn" onclick="filterByKit('nethop', this)"><img src="https://minecraft.wiki/images/Invicon_Netherite_Helmet.png"><span>NethOP</span></button>
            <button class="filter-btn" onclick="filterByKit('smp', this)"><img src="https://minecraft.wiki/images/Invicon_Shield.png"><span>SMP</span></button>
            <button class="filter-btn" onclick="filterByKit('sword', this)"><img src="https://minecraft.wiki/images/Invicon_Netherite_Sword.png"><span>Sword</span></button>
            <button class="filter-btn" onclick="filterByKit('axe', this)"><img src="https://minecraft.wiki/images/Invicon_Netherite_Axe.png"><span>Axe</span></button>
            <button class="filter-btn" onclick="filterByKit('mace', this)"><img src="https://minecraft.wiki/images/Invicon_Mace.png"><span>Mace</span></button>
        </div>

        <div id="playerList">
            <!-- LUISBACK (Resimdeki stile uygun) -->
            <div class="player-row" data-kits="all sword vanilla">
                <div class="rank-num">1.</div>
                <div class="player-img-box">
                    <img src="https://minotar.net/avatar/LuisBack/60" class="player-head">
                </div>
                <div class="player-details">
                    <div class="player-name">LuisBack</div>
                    <div class="player-stats">
                        <img src="https://minecraft.wiki/images/End_Crystal_JE2_BE2.png" class="crystal-icon">
                        Combat Specialist (75 points)
                    </div>
                </div>
                <div class="region-tag">TR</div>
                <div class="tiers-list">
                    <div class="tier-circle active">LT1</div>
                    <div class="tier-circle active">HT2</div>
                    <div class="tier-circle mace">HT1</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function changePage(pageId) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active');
    }

    function searchPlayer() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let players = document.querySelectorAll('.player-row');
        players.forEach(p => {
            let name = p.querySelector('.player-name').innerText.toLowerCase();
            p.style.display = name.includes(input) ? 'flex' : 'none';
        });
    }

    function filterByKit(kit, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        let players = document.querySelectorAll('.player-row');
        players.forEach(p => {
            let kits = p.getAttribute('data-kits');
            p.style.display = kits.includes(kit) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>

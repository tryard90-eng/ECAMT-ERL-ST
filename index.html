<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRTIERS | Rankings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --navbar-bg: #12151a;
            --container-bg: #161b22;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --gold: #ffb100;
            --silver: #8b949e;
            --bronze: #cd7f32;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Üst Menü Tasarımı */
        .header-wrapper {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            background-color: var(--navbar-bg);
            padding: 10px 25px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
        }
        .logo { color: #ff4444; font-weight: 900; font-size: 1.6rem; text-decoration: none; margin-right: 40px; }
        .logo span { color: #fff; }

        .nav-links { display: flex; gap: 15px; flex-grow: 1; }
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 10px;
            transition: 0.3s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link.active { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border-color); }

        /* Filtreleme Barı */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin: 20px auto 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: var(--navbar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            cursor: pointer;
            padding: 12px;
            border-radius: 12px;
            width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .filter-btn img { width: 28px; height: 28px; image-rendering: pixelated; }
        .filter-btn.active { border-color: #fff; color: #fff; background: #21262d; border-bottom: 3px solid var(--gold); }

        /* Tier Grid Sistemi */
        .info-strip {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            max-width: 1300px;
            margin: 0 auto 15px;
        }
        .info-btn { background: #21262d; padding: 6px 15px; border-radius: 8px; font-size: 0.8rem; border: 1px solid var(--border-color); color: #fff; cursor: pointer; }

        .tier-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .tier-column {
            background: rgba(22, 27, 34, 0.4);
            border-radius: 12px;
            min-height: 400px;
            padding-bottom: 20px;
        }

        /* Tier Başlıkları */
        .tier-header {
            padding: 15px;
            text-align: center;
            font-weight: 800;
            border-radius: 10px 10px 0 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.1rem;
        }
        .t1-head { background: #ffb100; color: #000; }
        .t2-head { background: #8b949e; color: #000; }
        .t3-head { background: #cd7f32; color: #fff; }
        .t4-head { background: #21262d; color: #8b949e; }
        .t5-head { background: #161b22; color: #8b949e; }

        /* Boş Durum */
        .empty-msg {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 50px;
            padding: 20px;
        }
        .empty-msg i { display: block; font-size: 2rem; margin-bottom: 10px; opacity: 0.3; }

        /* Oyuncu Kartı */
        .player-card {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            margin: 0 10px 8px 10px;
            background: transparent;
            transition: 0.2s;
            cursor: pointer;
        }
        .player-card:hover { background: rgba(255,255,255,0.05); border-radius: 8px; }
        .p-head { width: 32px; height: 32px; border-radius: 4px; margin-right: 12px; }
        .p-name { font-size: 0.9rem; font-weight: 500; flex-grow: 1; }
        .p-arrow { color: #30363d; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="header-wrapper">
    <a href="#" class="logo">TR<span>TIERS</span></a>
    <div class="nav-links">
        <a href="#" class="nav-link"><i class="fas fa-home"></i> Home</a>
        <a href="#" class="nav-link active"><i class="fas fa-trophy"></i> Rankings</a>
        <a href="#" class="nav-link"><i class="fab fa-discord"></i> Discords</a>
    </div>
</div>

<div class="filter-bar">
    <button class="filter-btn active" onclick="filterData('all', this)"><i class="fas fa-trophy" style="font-size: 1.5rem; color: var(--gold);"></i><span>Overall</span></button>
    <button class="filter-btn" onclick="filterData('vanilla', this)"><img src="https://minecraft.wiki/images/End_Crystal_JE2_BE2.png"><span>Vanilla</span></button>
    <button class="filter-btn" onclick="filterData('uhc', this)"><img src="https://minecraft.wiki/images/Enchanted_Golden_Apple_JE2_BE2.gif"><span>UHC</span></button>
    <button class="filter-btn" onclick="filterData('pot', this)"><img src="https://minecraft.wiki/images/Splash_Potion_of_Healing_JE2_BE2.png"><span>Pot</span></button>
</div>

<div class="info-strip">
    <button class="info-btn"><i class="fas fa-info-circle"></i> Information</button>
    <div class="info-btn">IP: trpvp.club</div>
</div>

<div class="tier-grid">
    <!-- Sütun 1 -->
    <div class="tier-column">
        <div class="tier-header t1-head"><i class="fas fa-trophy"></i> Tier 1</div>
        <div id="tier1-list"></div>
    </div>
    <!-- Sütun 2 -->
    <div class="tier-column">
        <div class="tier-header t2-head"><i class="fas fa-trophy"></i> Tier 2</div>
        <div id="tier2-list"></div>
    </div>
    <!-- Sütun 3 -->
    <div class="tier-column">
        <div class="tier-header t3-head"><i class="fas fa-trophy"></i> Tier 3</div>
        <div id="tier3-list"></div>
    </div>
    <!-- Sütun 4 -->
    <div class="tier-column">
        <div class="tier-header t4-head">Tier 4</div>
        <div id="tier4-list"></div>
    </div>
    <!-- Sütun 5 -->
    <div class="tier-column">
        <div class="tier-header t5-head">Tier 5</div>
        <div id="tier5-list"></div>
    </div>
</div>

<script>
    // ÖRNEK VERİ SETİ (Buraya istediğin kadar oyuncu ekle)
    const players = [
        { name: "LuisBack", tier: 1, kits: ["vanilla", "pot"] },
        { name: "Bambamprolava", tier: 3, kits: ["vanilla"] },
        { name: "BnRoots_", tier: 3, kits: ["uhc", "pot"] },
        { name: "1Bacon17_", tier: 4, kits: ["vanilla"] },
        { name: "_MrStar", tier: 5, kits: ["pot"] },
        { name: "Corteixzz", tier: 3, kits: ["vanilla"] }
    ];

    function filterData(kit, btn) {
        // Buton aktiflik durumu
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Listeleri temizle
        for(let i=1; i<=5; i++) {
            document.getElementById(`tier${i}-list`).innerHTML = "";
        }

        // Oyuncuları filtrele ve dağıt
        const filtered = kit === 'all' ? players : players.filter(p => p.kits.includes(kit));

        // Sütunlara ekle
        for(let i=1; i<=5; i++) {
            const tierPlayers = filtered.filter(p => p.tier === i);
            const container = document.getElementById(`tier${i}-list`);

            if(tierPlayers.length === 0) {
                container.innerHTML = `<div class="empty-msg"><i class="fas fa-smile-wink"></i>Henüz oyuncu yok</div>`;
            } else {
                tierPlayers.forEach(p => {
                    container.innerHTML += `
                        <div class="player-card">
                            <img src="https://minotar.net/avatar/${p.name}/32" class="p-head">
                            <span class="p-name">${p.name}</span>
                            <i class="fas fa-chevron-up p-arrow"></i>
                        </div>
                    `;
                });
            }
        }
    }

    // Sayfa açıldığında ilk yükleme
    filterData('all', document.querySelector('.filter-btn'));
</script>

</body>
</html>
